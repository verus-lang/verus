[workspace]
resolver = "2"
members = [
  "air",
  "builtin",
  "builtin_macros",
  "cargo-verus",
  "cargo-verus-toolchains",
  "vir",
  "vir_macros",
  "rust_verify",
  "verus",
  "rust_verify_test",
  "rust_verify_test_macros",
  "state_machines_macros",
  "verusdoc",
  "vstd_build",
  "tools/bump_crate_versions",
  "tools/internals_interface",
  "tools/line_count",
]
exclude = [
  "vstd",
]

# do not modify the following two lines
[workspace.metadata.vargo]
tag = "workspace"

[workspace.dependencies]
anyhow = "1.0.103"
bincode-next = { version = "3.1", features = ["serde"] }
cargo_metadata = "0.23.1"
chrono = "0.4.41"
clap-cargo = { version = "0.18.3", features = ["clap", "cargo_metadata"] }
clap = { version = "4.5.53", features = ["derive"] }
colored = "3.0.0"
console = { version = "0.15", default-features = false, features = ["ansi-parsing"] }
crates_io_api = "0.12.0"
getopts = { git = "https://github.com/utaal/getopts.git", branch = "parse-partial" }
git2 = { version = "0.21", default-features = false, features = [] }
hex = "0.4.3"
html5ever = "0.26" # TODO: kuchikiki depends on 0.26
im = "15.1.0"
indexmap = "1"
indicatif = "0.18"
is-terminal = { version = "0.4.9" }
itertools = "0.14.0"
# kuchikiki has a shakey maintainability story, would be great to remove
# it is transitively using an old version of html5ever and of rand (which has as security advisory)
kuchikiki = "0.8.2"
num-bigint = { version = "0.4.4", features = ["serde"] }
num-format = "0.4.0"
num-traits= "0.2.16"
petgraph = "0.6"
proc-macro2 = "1.0.39"
quote = "1.0"
rand = "0.10"
regex = "1.11"
rustc_tools_util = "0.3.0"
serde_json = { version = "1.0.145", features = ["preserve_order"] }
serde = { version = "1", features = ["std", "derive", "rc"] }
sha2 = "0.10.2"
sise = "0.6.0"
# smt-scope is using very outdated dependencies and seems unmaintained
# it is using:
# - petgraph 0.6
# - instant (unmaintained) -- transitive
# - fxhash (unmaintained)
# - bincode (unmaintained)
# - proc-macro-error (unmaintained) -- transitive
smt-scope = { version = "0.1.7", features = ["analysis"] }
synstructure = "0.13.2"
syn = { version = "2.0", features = ["full", "visit", "visit-mut", "extra-traits"] }
tabled = "0.14.0"
tempfile = "3.23"
toml = "1.1.2"
toml_edit = "0.23.3"
tracing = "0.1"
walkdir = "2.3.2"
yansi = "0.5"
zip = "8.6"

# internal dependencies
air = { path = "air" }
cargo-verus-toolchains = { path = "cargo-verus-toolchains" }
internals_interface = { path = "tools/internals_interface" }
rustc_mir_build_verus = { path = "rustc_mir_build", package = "rustc_mir_build" }
rust_verify_test_macros = { path = "rust_verify_test_macros" }
verus_prettyplease = { version = "=0.0.0-2026-05-31-0205", path = "../dependencies/prettyplease" }
verus_syn = { version = "=0.0.0-2026-05-31-0205", path = "../dependencies/syn", features = ["full", "visit", "visit-mut", "extra-traits"] }
vir-macros = { path = "vir_macros" }
vir = { path = "vir" }

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(verus_keep_ghost)',
  'cfg(verus_verify_core)',
] }

[workspace.lints.clippy]
# These are all the lints required to make clippy pass
# Lints are grouped by [lint groups](https://doc.rust-lang.org/clippy/lints.html)
# correctness/perf/suspicious are the priority groups
#
# Clippy Policy:
#
# Goal: reduce the set of lints being supressed, as it helps to maintain code
# quality across the codebase while at the same time unburdening reviewers
#
# How: remove a particular suppression one by one and fix the underlying issue.
# From that point onward the lint is enforced.
#
# Escape hatches: some clippy lints are particularly nitpicky/pedantic.
#  - If the complaints are localized, consider annotating it with `[allow(clippy::lint)]`,
#    preferably with a comment explaining why it's reasonable to do so.
#
#  - If the lint is triggering a lot and is overly pedantic, consider leaving it supressed
#    and commenting on the fact that it's too pedantic
#
#  - If an already enforced lint is being pedantic for a particular instance, where
#    fixing it would be overly complex, consider also `allow`ing it on that particular instance.

# suspicious
# do not remove: see https://github.com/verus-lang/verus/pull/2091#discussion_r2710412679 for a discussion
manual_unwrap_or_default = "allow"

# style
assign_op_pattern = "allow"
chars_last_cmp = "allow"
collapsible_else_if = "allow"
collapsible_if = "allow"
collapsible_match = "allow"
comparison_to_empty = "allow"
doc_lazy_continuation = "allow"
doc_overindented_list_items = "allow"
enum_variant_names = "allow"
for_kv_map = "allow"
from_over_into = "allow"
get_first = "allow"
if_same_then_else = "allow"
inherent_to_string = "allow"
into_iter_on_ref = "allow"
is_digit_ascii_radix = "allow"
len_zero = "allow"
let_and_return = "allow"
let_unit_value = "allow"
manual_map = "allow"
manual_range_contains = "allow"
manual_repeat_n = "allow"
map_clone = "allow"
match_like_matches_macro = "allow"
match_ref_pats = "allow"
match_result_ok = "allow"
mem_replace_option_with_some = "allow"
mem_replace_with_default = "allow"
missing_safety_doc = "allow"
needless_borrow = "allow"
needless_borrows_for_generic_args = "allow"
needless_else = "allow"
needless_late_init = "allow"
needless_range_loop = "allow"
needless_return = "allow"
new_without_default = "allow"
non_minimal_cfg = "allow"
op_ref = "allow"
option_map_or_none = "allow"
partialeq_to_none = "allow"
print_literal = "allow"
ptr_arg = "allow"
question_mark = "allow"
redundant_closure = "allow"
redundant_field_names = "allow"
redundant_pattern_matching = "allow"
redundant_static_lifetimes = "allow"
result_unit_err = "allow"
should_implement_trait = "allow"
single_char_add_str = "allow"
single_match = "allow"
to_string_trait_impl = "allow"
unnecessary_lazy_evaluations = "allow"
unnecessary_map_or = "allow"
unnecessary_mut_passed = "allow"
unneeded_struct_pattern = "allow"
unused_unit = "allow"
unwrap_or_default = "allow"
upper_case_acronyms = "allow"
while_let_on_iterator = "allow"
writeln_empty_string = "allow"
write_with_newline = "allow"
wrong_self_convention = "allow"
zero_ptr = "allow"
empty_line_after_doc_comments = "allow"

# complexity
bind_instead_of_map = "allow"
bool_comparison = "allow"
borrow_deref_ref = "allow"
char_lit_as_u8 = "allow"
clone_on_copy = "allow"
derivable_impls = "allow"
explicit_auto_deref = "allow"
extra_unused_lifetimes = "allow"
match_single_binding = "allow"
needless_arbitrary_self_type = "allow"
needless_lifetimes = "allow"
needless_question_mark = "allow"
nonminimal_bool = "allow"
only_used_in_recursion = "allow"
option_as_ref_deref = "allow"
option_map_unit_fn = "allow"
redundant_guards = "allow"
search_is_some = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unit_arg = "allow"
useless_conversion = "allow"
useless_format = "allow"
